<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>My Personal Blog</title>
	<style type="text/css">
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
			font-size: 16px;
			color: #333;
		}
		header {
			background-color: #3b5998;
			color: #fff;
			padding: 20px;
			text-align: center;
			font-size: 32px;
			font-weight: bold;
			text-shadow: 1px 1px 1px #555;
		}
		nav {
			background-color: #f2f2f2;
			padding: 10px;
			text-align: center;
		}
		nav ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
		}
		nav ul li {
			display: inline-block;
			margin: 0 10px;
		}
		nav ul li a {
			color: #333;
			text-decoration: none;
			padding: 5px 10px;
			border-radius: 5px;
			transition: background-color 0.2s ease-in-out;
		}
		nav ul li a:hover {
			background-color: #f2f2f2;
		}
		main {
			margin: 20px;
			padding: 20px;
			background-color: #fff;
			box-shadow: 0 2px 4px #ccc;
		}
		h1 {
			font-size: 28px;
			font-weight: bold;
			margin: 0;
			margin-bottom: 10px;
		}
		h2 {
			font-size: 24px;
			font-weight: bold;
			margin: 0;
			margin-bottom: 10px;
		}
		p {
			margin: 0;
			margin-bottom: 10px;
			line-height: 1.5;
		}
		footer {
			background-color: #f2f2f2;
			padding: 10px;
			text-align: center;
			font-size: 14px;
			color: #999;
		}
	</style>
</head>

	</nav>
